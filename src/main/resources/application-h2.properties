# ========== Embedded H2 Database (Standalone-Modus) ==========
# H2 im MySQL-Kompatibilitaetsmodus: alle MySQL-Queries funktionieren
# AUTO_SERVER ist mit DB_CLOSE_ON_EXIT in H2 2.x nicht mehr kompatibel und verursacht Startfehler.
spring.datasource.url=jdbc:h2:file:${user.home}/ERP-Handwerk/datenbank;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA: H2-Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway deaktiviert (Hibernate ddl-auto=update erstellt Schema automatisch)
spring.flyway.enabled=false

# Schema beim ersten Start aus den Entities erzeugen (sonst crasht ddl-auto=validate
# aus application.properties auf leerer H2-Datei -> JVM beendet, .exe-Fenster schliesst).
spring.jpa.hibernate.ddl-auto=update

# HikariCP: MySQL-spezifisches Init-SQL ueberschreiben (nicht noetig fuer H2)
spring.datasource.hikari.connectionInitSql=

# RAG deaktivieren (benoetigt Gemini API-Key)
ai.rag.enabled=false

# Email-Features deaktivieren (benoetigt IMAP-Server)
email.features.enabled=false
smtp.host=localhost
smtp.port=1025
smtp.username=demo@example.local
smtp.password=demo

# Uploads in User-Home statt user.dir (jpackage: user.dir = Program Files, keine Schreibrechte)
file.upload-dir=${user.home}/ERP-Handwerk/uploads
file.mail-attachment-dir=${user.home}/ERP-Handwerk/uploads/attachments
file.supplier-mail-attachment-dir=${user.home}/ERP-Handwerk/uploads/attachments/lieferanten
file.image-upload-dir=${user.home}/ERP-Handwerk/uploads/images
file.offer-upload-dir=${user.home}/ERP-Handwerk/uploads/offers
file.cutaway_images-dir=${user.home}/ERP-Handwerk/uploads/cutaway_images
hicad.local-path=${user.home}/ERP-Handwerk/uploads/CADdrawings
hicad.network-url=http://localhost/hicad
file.form-template-dir=${user.home}/ERP-Handwerk/uploads/formulare

# Logging in Datei (fuer Crash-Debugging)
logging.file.name=${user.home}/ERP-Handwerk/erp-handwerk.log
