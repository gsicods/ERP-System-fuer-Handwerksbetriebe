# DevTools: Restart deaktivieren während E-Mail-Import läuft (lange IMAP-Operationen)
spring.devtools.restart.enabled=false

spring.application.name=Kalkulationsprogramm
spring.profiles.active=local

# ========== Authentifizierung ==========
# Bootstrap-Admin für das Frontend-Login (wird beim ersten Start angelegt, falls noch kein Login-Benutzer existiert):
#   Windows (PowerShell):  $env:APP_ADMIN_USER="meinUser"; $env:APP_ADMIN_PASS="meinPasswort"
#   Linux/macOS:           export APP_ADMIN_USER=meinUser APP_ADMIN_PASS=meinPasswort
app.admin.username=${APP_ADMIN_USER:}
app.admin.password=${APP_ADMIN_PASS:}

# Datenbank (MariaDB oder MySQL; Credentials in application-local.properties oder per ENV)
# Beispiele:
#   MariaDB: jdbc:mariadb://localhost:3307/kalkulationsprogramm_db?useUnicode=true&characterEncoding=UTF-8
#   MySQL:   jdbc:mysql://localhost:3306/kalkulationsprogramm_db?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.url=${APP_DB_URL:jdbc:mysql://localhost:3307/kalkulationsprogramm_db?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.driver-class-name=${APP_DB_DRIVER:}
spring.datasource.username=${APP_DB_USER:OVERRIDE_IN_LOCAL}
spring.datasource.password=${APP_DB_PASS:OVERRIDE_IN_LOCAL}
server.port=8080
#Backups
# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=OFF
# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true
# TEMPORÄR: Checksum-Validierung deaktivieren wegen V102-Mismatch (nach erfolgreicher Migration entfernen!)
spring.flyway.validate-on-migrate=false
# Upload-Konfiguration
hicad.local-path=${user.dir}/uploads/CADdrawings
hicad.network-url=OVERRIDE_IN_LOCAL
hicad.network-drive-letter=Z:

file.upload-dir=${user.dir}/uploads
file.mail-attachment-dir=${user.dir}/uploads/attachments
file.supplier-mail-attachment-dir=${user.dir}/uploads/attachments/lieferanten
file.image-upload-dir=${user.dir}/uploads/images
file.offer-upload-dir=${user.dir}/uploads/offers
file.cutaway_images-dir=${user.dir}/uploads/cutaway_images

spring.servlet.multipart.max-file-size=15GB
spring.servlet.multipart.max-request-size=15GB
# Info: Die Anwendung ist unter http://localhost:8082 erreichbar

# Zeiterfassung PWA Base-URL (für QR-Code Generierung, Override in application-local.properties)
zeiterfassung.base-url=https://localhost
# SMTP- und IMAP-Zugangsdaten werden zur Laufzeit über die UI
# (System-Einstellungen → E-Mail-Konto) gepflegt und in der Tabelle
# system_setting gespeichert. Hier KEINE Defaults mehr setzen.
# Encoding configuration
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.datasource.hikari.connectionInitSql=SET NAMES utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
# Use a lighter isolation level to reduce gap locks
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.jpa.properties.hibernate.connection.isolation=2
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
# Standard E-Mail-Signatur (HTML, %s wird durch den Benutzernamen ersetzt)


ai.email.enabled=true

# Setze auf false, um KI zu deaktivieren
# ai.email.enabled=false

# Email-Features (Import, Cleanup, Vendor-Abruf) komplett deaktivieren
# Auf true setzen, um Email-Scheduled-Tasks wieder zu aktivieren
email.features.enabled=false

##
## Ollama Cloud (OpenAI-kompatibel)
##
# ai.email.provider=ollama-cloud
# ai.email.url=https://api.ollama.com/v1/chat/completions   # optional, Standard
# ai.email.model=gpt-oss:120b                              # Beispielmodell
#
# API-SchlÃ¼ssel NICHT hier eintragen. Stattdessen als Umgebungsvariable setzen:
#   Windows (PowerShell):   $env:OLLAMA_API_KEY="<dein key>"
#   Linux/macOS (bash):     export OLLAMA_API_KEY="<dein key>"
#

# ========== GEMINI Scanner & PDF ==========
# API Key wird zur Laufzeit über die UI (System-Einstellungen → KI Gemini)
# gepflegt und in der Tabelle system_setting gespeichert.

# Separate Modelle pro Service (latest = immer das neueste Modell)
ai.gemini.model.dokument-analyse=gemini-flash-latest
ai.gemini.model.scanner=gemini-flash-latest
ai.gemini.model.pdf-extractor=gemini-flash-latest
ai.gemini.model.pro=gemini-pro-latest
# E-Mail KI (Beautify/Korrektur)
ai.email.model=gemini-flash-latest

# KI-Hilfe Chat Modell (gemini-flash-latest unterstuetzt Google Search Grounding)
ai.ki-hilfe.model=gemini-flash-latest
ai.ki-hilfe.web-search-enabled=true

# Email-Zuordnung (Klassifizierung eingehender Mails zu Projekten/Anfragen)
# Bewusst leichtgewichtiges Modell – Klassifizierung muss schnell + guenstig sein.
ai.gemini.model.email-classification=gemini-2.5-flash-lite

# ========== Lokales Ollama (nicht mehr fuer Email-Zuordnung genutzt) ==========
ai.ollama.enabled=true
ai.ollama.url=http://localhost:11434
ai.ollama.model=qwen3:8b
ai.ollama.timeout=120

# ========== RAG / Lokale Vektor-Suche ==========
# Beim Start wird der Quellcode gechunkt und per Gemini embedded (kein Docker noetig)
ai.rag.enabled=true
ai.rag.top-k=15
ai.rag.score-threshold=0.3

# HikariCP Timeouts für lange KI-Anfragen
spring.datasource.hikari.connection-timeout=120000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========== VENDOR INVOICE INTEGRATION ==========
# Microsoft Azure Billing API (für Azure/M365 Rechnungen)
vendor.microsoft.enabled=false
vendor.microsoft.tenant-id=
vendor.microsoft.client-id=
vendor.microsoft.client-secret=
vendor.microsoft.billing-account-id=

# Amazon Business Reconciliation API (für Amazon Rechnungen)
vendor.amazon.enabled=false
vendor.amazon.client-id=
vendor.amazon.client-secret=
vendor.amazon.refresh-token=
vendor.amazon.region=EU

# Apple: Keine API verfügbar - Rechnungen via E-Mail (GlobalEmailWatcher)

# Jackson: LocalDate als ISO-String statt Array serialisieren
spring.jackson.serialization.write-dates-as-timestamps=false

# Enable Legacy Ant Path Matcher for Regex support in URLs (e.g. /zeiterfassung/**/{path:[^\.]*})
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ========== CLOUDFLARE ACCESS (Funnel-Endpoint /api/internal/**) ==========
# Aktiviert die JWT-Verifikation für Anfragen aus dem Marketing-Webseiten-Funnel.
# Lokal/im Dev: enabled=false (Default). In Produktion auf true setzen.
# - team-domain: <name>.cloudflareaccess.com (aus dem CF Zero Trust Dashboard)
# - application-aud: AUD-Tag der CF-Access-Application (Settings → Overview)
cloudflare.access.enabled=${CF_ACCESS_ENABLED:false}
cloudflare.access.team-domain=${CF_ACCESS_TEAM_DOMAIN:}
cloudflare.access.application-aud=${CF_ACCESS_APPLICATION_AUD:}

# ========== WEB PUSH NOTIFICATIONS (VAPID) ==========
# Für iOS PWA Lock-Screen Benachrichtigungen bei Kalendereinträgen
# Generiere Keys mit: java -cp target/classes org.example.kalkulationsprogramm.service.VapidKeyGenerator
push.vapid.public-key=${PUSH_VAPID_PUBLIC_KEY:}
push.vapid.private-key=${PUSH_VAPID_PRIVATE_KEY:}
push.vapid.subject=${PUSH_VAPID_SUBJECT:mailto:info-bauschlosserei-kuhn@t-online.de}
